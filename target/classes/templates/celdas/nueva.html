<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Celda - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <a th:href="@{/celdas}" class="btn btn-secondary">← Volver a Celdas</a>
        </div>
        <div class="content-box">
            <h2>+ Registrar Nueva Celda</h2>

            <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

            <form th:action="@{/celdas/nueva}" method="post">
                <div class="form-group">
                    <label>Código único:</label>
                    <input type="text" name="codigo" placeholder="Ej: A-101" required maxlength="20"/>
                </div>
                <div class="form-group">
                    <label>Tipo:</label>
                    <select name="tipo" required>
                        <option th:each="t : ${tipoCelda}" th:value="${t}" th:text="${t}">AUTO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ubicación/Sector:</label>
                    <input type="text" name="ubicacion" placeholder="Ej: Piso 1" maxlength="100"/>
                </div>
                <div style="display:flex;gap:15px;margin-top:20px;">
                    <button type="submit" class="btn btn-success" style="flex:1;">✓ Guardar Celda</button>
                    <a th:href="@{/celdas}" class="btn btn-secondary">✗ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
