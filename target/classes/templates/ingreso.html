<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ingreso - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <a th:href="@{/menu}" class="btn btn-secondary">← Volver al Menú</a>
        </div>

        <div class="content-box">
            <h2>📥 Registrar Ingreso de Vehículo</h2>

            <div th:if="${mensaje}" class="alert alert-success">
                ✓ <span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                ✗ <span th:text="${error}"></span>
            </div>

            <form th:action="@{/ingreso}" th:object="${form}" method="post">
                <h3>🚙 Información del Vehículo</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Placa:</label>
                        <input type="text" th:field="*{placa}" placeholder="Ej: ABC123" required/>
                    </div>
                    <div class="form-group">
                        <label>VIN (17 caracteres):</label>
                        <input type="text" th:field="*{vin}" placeholder="Número de identificación" maxlength="17" required/>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Vehículo:</label>
                        <select th:field="*{tipoVehiculo}" id="tipoVehiculo" required>
                            <option value="">-- Seleccione --</option>
                            <option th:value="Carro">🚗 Carro</option>
                            <option th:value="Moto">🏍️ Moto</option>
                        </select>
                    </div>
                </div>

                <h3>👤 Información del Cliente</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Cédula:</label>
                        <input type="text" th:field="*{cedula}" placeholder="Número de identificación" required/>
                    </div>
                    <div class="form-group">
                        <label>Nombre Completo:</label>
                        <input type="text" th:field="*{nombre}" placeholder="Nombre del cliente" required/>
                    </div>
                    <div class="form-group">
                        <label>Teléfono:</label>
                        <input type="text" th:field="*{telefono}" placeholder="Número de contacto" required/>
                    </div>
                </div>

                <h3>🅿️ Asignación de Celda</h3>
                <div class="form-group">
                    <label>Celda disponible <span style="color:red;">*</span>:</label>
                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                        <select th:field="*{idCelda}" id="celdaSelect" required style="flex:1;min-width:200px;">
                            <option value="">-- Seleccione una celda --</option>
                        </select>
                        <button type="button" class="btn btn-secondary" onclick="cargarCeldasDisponibles()">
                            🔄 Consultar disponibles
                        </button>
                    </div>
                    <small style="color:#666;">Seleccione el tipo de vehículo y consulte las celdas disponibles.</small>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-success" style="flex: 1;">✓ Guardar Ingreso</button>
                    <a th:href="@{/menu}" class="btn btn-secondary">✗ Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        function cargarCeldasDisponibles() {
            var tipoVehiculo = document.getElementById('tipoVehiculo').value;
            var tipoCelda = tipoVehiculo === 'Carro' ? 'AUTO' : (tipoVehiculo === 'Moto' ? 'MOTO' : '');
            var url = '/api/celdas/disponibles' + (tipoCelda ? '?tipo=' + tipoCelda : '');

            fetch(url, { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(celdas) {
                    var select = document.getElementById('celdaSelect');
                    select.innerHTML = '<option value="">-- Seleccione una celda --</option>';
                    if (celdas.length === 0) {
                        select.innerHTML += '<option value="" disabled>No hay celdas disponibles</option>';
                    } else {
                        celdas.forEach(function(c) {
                            select.innerHTML += '<option value="' + c.idCelda + '">'
                                + c.codigo + ' (' + c.tipo + ' - ' + (c.ubicacion || '') + ')</option>';
                        });
                    }
                })
                .catch(function(err) {
                    alert('Error al cargar celdas: ' + err);
                });
        }

        // Cargar celdas al cambiar tipo de vehículo
        document.getElementById('tipoVehiculo').addEventListener('change', cargarCeldasDisponibles);
    </script>
</body>
</html>
