<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gestión de Empleados - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <div style="display:flex;gap:10px;align-items:center;">
                <a th:href="@{/menu}" class="btn btn-secondary">← Volver al Menú</a>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-danger">🚪 Cerrar Sesión</button>
                </form>
            </div>
        </div>

        <div class="content-box">
            <h2>👥 Gestión de Empleados</h2>

            <div th:if="${param.exito}" class="alert alert-success">✓ Operación realizada con éxito.</div>
            <div th:if="${param.eliminado}" class="alert alert-success">✓ Empleado eliminado.</div>

            <div style="margin-bottom:20px;">
                <a th:href="@{/empleados/nuevo}" class="btn btn-success">+ Nuevo Empleado</a>
            </div>

            <table style="width:100%;border-collapse:collapse;">
                <thead>
                    <tr style="background:#f4f4f4;">
                        <th style="padding:10px;border:1px solid #ddd;">Nombre</th>
                        <th style="padding:10px;border:1px solid #ddd;">Documento</th>
                        <th style="padding:10px;border:1px solid #ddd;">Email</th>
                        <th style="padding:10px;border:1px solid #ddd;">Teléfono</th>
                        <th style="padding:10px;border:1px solid #ddd;">Último Login</th>
                        <th style="padding:10px;border:1px solid #ddd;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${empleados}">
                        <td style="padding:10px;border:1px solid #ddd;" th:text="${emp.nombreCompleto}">-</td>
                        <td style="padding:10px;border:1px solid #ddd;" th:text="${emp.documento}">-</td>
                        <td style="padding:10px;border:1px solid #ddd;" th:text="${emp.email}">-</td>
                        <td style="padding:10px;border:1px solid #ddd;" th:text="${emp.telefono}">-</td>
                        <td style="padding:10px;border:1px solid #ddd;" th:text="${emp.ultimoLogin}">-</td>
                        <td style="padding:10px;border:1px solid #ddd;">
                            <a th:href="@{/empleados/{id}/editar(id=${emp.idEmpleado})}" class="btn btn-secondary" style="padding:4px 8px;font-size:13px;">✏️ Editar</a>
                            <form th:action="@{/empleados/{id}/eliminar(id=${emp.idEmpleado})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('¿Eliminar empleado?');">
                                <button type="submit" class="btn btn-danger" style="padding:4px 8px;font-size:13px;">🗑️ Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(empleados)}">
                        <td colspan="6" style="text-align:center;padding:20px;color:#999;">No hay empleados registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
