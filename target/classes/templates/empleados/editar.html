<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Empleado - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <a th:href="@{/empleados}" class="btn btn-secondary">← Volver a Empleados</a>
        </div>
        <div class="content-box">
            <h2>✏️ Editar Empleado</h2>

            <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

            <form th:action="@{/empleados/{id}/editar(id=${empleado.idEmpleado})}" method="post">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" name="nombreCompleto" th:value="${empleado.nombreCompleto}"
                           required maxlength="100"/>
                </div>
                <div class="form-group">
                    <label>Documento:</label>
                    <input type="text" name="documento" th:value="${empleado.documento}"
                           required maxlength="20"/>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" th:value="${empleado.email}"
                           required maxlength="100"/>
                </div>
                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="telefono" th:value="${empleado.telefono}" maxlength="20"/>
                </div>
                <div class="form-group">
                    <label>Nueva Contraseña (dejar vacío para no cambiar):</label>
                    <input type="password" name="contrasena" placeholder="Nueva contraseña" minlength="6"/>
                </div>
                <div style="display:flex;gap:15px;margin-top:20px;">
                    <button type="submit" class="btn btn-success" style="flex:1;">✓ Guardar Cambios</button>
                    <a th:href="@{/empleados}" class="btn btn-secondary">✗ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
