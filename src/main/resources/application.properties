# ===================================================================
# CONFIGURACION DE LA APLICACION AUTOS COLOMBIA
# ===================================================================

spring.application.name=AutosColombia
server.port=8080

# ===================================================================
# BASE DE DATOS H2 (desarrollo / pruebas)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:parqueadero_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (opcional, acceso via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

