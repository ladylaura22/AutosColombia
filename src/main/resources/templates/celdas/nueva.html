<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Nueva Celda', 'celdas')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">+ Registrar Nueva Celda</h2>
                <p class="card-subtitle">Agregue una nueva celda al parqueadero</p>
            </div>
            <a th:href="@{/celdas}" class="btn btn-outline btn-sm">← Volver a Celdas</a>
        </div>

        <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

        <form th:action="@{/celdas/nueva}" method="post">
            <div class="form-grid">
                <div class="form-field col-4">
                    <label class="form-label" for="codigo">Código único <span class="req">*</span></label>
                    <input id="codigo" type="text" name="codigo"
                           class="form-input" placeholder="Ej: A-101" required maxlength="20"/>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="tipo">Tipo <span class="req">*</span></label>
                    <select id="tipo" name="tipo" class="form-select" required>
                        <option th:each="t : ${tipoCelda}" th:value="${t}" th:text="${t}">AUTO</option>
                    </select>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="ubicacion">Ubicación / Sector</label>
                    <input id="ubicacion" type="text" name="ubicacion"
                           class="form-input" placeholder="Ej: Piso 1" maxlength="100"/>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/celdas}" class="btn btn-outline">✗ Cancelar</a>
                <button type="submit" class="btn btn-success">✓ Guardar Celda</button>
            </div>
        </form>
    </div>

</section>
</body>
</html>
