<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Gestión de Empleados', 'empleados')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">👥 Gestión de Empleados</h2>
                <p class="card-subtitle">Registrar, editar y eliminar empleados del sistema</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <a th:href="@{/empleados/nuevo}" class="btn btn-success btn-sm">+ Nuevo Empleado</a>
                <a th:href="@{/menu}" class="btn btn-outline btn-sm">← Volver al Menú</a>
            </div>
        </div>

        <div th:if="${param.exito}"    class="alert alert-success">✓ Operación realizada con éxito.</div>
        <div th:if="${param.eliminado}" class="alert alert-success">✓ Empleado eliminado.</div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Último Login</th>
                        <th style="text-align:right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${empleados}">
                        <td th:text="${emp.nombreCompleto}">-</td>
                        <td th:text="${emp.documento}">-</td>
                        <td th:text="${emp.email}">-</td>
                        <td th:text="${emp.telefono}">-</td>
                        <td th:text="${emp.ultimoLogin}">-</td>
                        <td style="text-align:right; white-space:nowrap;">
                            <a th:href="@{/empleados/{id}/editar(id=${emp.idEmpleado})}"
                               class="btn btn-secondary btn-sm">✏️ Editar</a>
                            <form th:action="@{/empleados/{id}/eliminar(id=${emp.idEmpleado})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('¿Eliminar empleado?');">
                                <button type="submit" class="btn btn-danger btn-sm">🗑️ Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(empleados)}">
                        <td colspan="6" class="table-empty">No hay empleados registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
</body>
</html>
