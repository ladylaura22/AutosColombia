<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Nuevo Empleado', 'empleados')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">👤 Registrar Nuevo Empleado</h2>
                <p class="card-subtitle">Complete los datos del nuevo empleado</p>
            </div>
            <a th:href="@{/empleados}" class="btn btn-outline btn-sm">← Volver a Empleados</a>
        </div>

        <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

        <form th:action="@{/empleados/nuevo}" method="post">
            <div class="form-grid">
                <div class="form-field col-6">
                    <label class="form-label" for="nombreCompleto">Nombre Completo <span class="req">*</span></label>
                    <input id="nombreCompleto" type="text" name="nombreCompleto"
                           class="form-input" placeholder="Nombre completo" required maxlength="100"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="documento">Documento <span class="req">*</span></label>
                    <input id="documento" type="text" name="documento"
                           class="form-input" placeholder="Número de documento" required maxlength="20"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="email">Email (usado para iniciar sesión) <span class="req">*</span></label>
                    <input id="email" type="email" name="email"
                           class="form-input" placeholder="correo@ejemplo.com" required maxlength="100"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="telefono">Teléfono</label>
                    <input id="telefono" type="text" name="telefono"
                           class="form-input" placeholder="Número de teléfono" maxlength="20"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="contrasena">Contraseña inicial <span class="req">*</span></label>
                    <input id="contrasena" type="password" name="contrasena"
                           class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6"/>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/empleados}" class="btn btn-outline">✗ Cancelar</a>
                <button type="submit" class="btn btn-success">✓ Guardar Empleado</button>
            </div>
        </form>
    </div>

</section>
</body>
</html>
