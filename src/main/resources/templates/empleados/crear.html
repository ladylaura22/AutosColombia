<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nuevo Empleado - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <a th:href="@{/empleados}" class="btn btn-secondary">← Volver a Empleados</a>
        </div>
        <div class="content-box">
            <h2>👤 Registrar Nuevo Empleado</h2>

            <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

            <form th:action="@{/empleados/nuevo}" method="post">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" name="nombreCompleto" placeholder="Nombre completo" required maxlength="100"/>
                </div>
                <div class="form-group">
                    <label>Documento:</label>
                    <input type="text" name="documento" placeholder="Número de documento" required maxlength="20"/>
                </div>
                <div class="form-group">
                    <label>Email (se usará para iniciar sesión):</label>
                    <input type="email" name="email" placeholder="correo@ejemplo.com" required maxlength="100"/>
                </div>
                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="telefono" placeholder="Número de teléfono" maxlength="20"/>
                </div>
                <div class="form-group">
                    <label>Contraseña inicial:</label>
                    <input type="password" name="contrasena" placeholder="Contraseña" required minlength="6"/>
                </div>
                <div style="display:flex;gap:15px;margin-top:20px;">
                    <button type="submit" class="btn btn-success" style="flex:1;">✓ Guardar Empleado</button>
                    <a th:href="@{/empleados}" class="btn btn-secondary">✗ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
