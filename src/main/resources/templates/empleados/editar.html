<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Editar Empleado', 'empleados')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">✏️ Editar Empleado</h2>
                <p class="card-subtitle">Modifique los datos del empleado</p>
            </div>
            <a th:href="@{/empleados}" class="btn btn-outline btn-sm">← Volver a Empleados</a>
        </div>

        <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

        <form th:action="@{/empleados/{id}/editar(id=${empleado.idEmpleado})}" method="post">
            <div class="form-grid">
                <div class="form-field col-6">
                    <label class="form-label" for="nombreCompleto">Nombre Completo <span class="req">*</span></label>
                    <input id="nombreCompleto" type="text" name="nombreCompleto"
                           class="form-input" th:value="${empleado.nombreCompleto}"
                           required maxlength="100"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="documento">Documento <span class="req">*</span></label>
                    <input id="documento" type="text" name="documento"
                           class="form-input" th:value="${empleado.documento}"
                           required maxlength="20"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="email">Email <span class="req">*</span></label>
                    <input id="email" type="email" name="email"
                           class="form-input" th:value="${empleado.email}"
                           required maxlength="100"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="telefono">Teléfono</label>
                    <input id="telefono" type="text" name="telefono"
                           class="form-input" th:value="${empleado.telefono}" maxlength="20"/>
                </div>
                <div class="form-field col-6">
                    <label class="form-label" for="contrasena">Nueva Contraseña</label>
                    <input id="contrasena" type="password" name="contrasena"
                           class="form-input" placeholder="Dejar vacío para no cambiar" minlength="6"/>
                    <p class="form-hint">Dejar vacío para mantener la contraseña actual.</p>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/empleados}" class="btn btn-outline">✗ Cancelar</a>
                <button type="submit" class="btn btn-success">✓ Guardar Cambios</button>
            </div>
        </form>
    </div>

</section>
</body>
</html>
