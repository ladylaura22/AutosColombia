<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Registrar Ingreso', 'ingreso')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">📥 Registrar Ingreso de Vehículo</h2>
                <p class="card-subtitle">Complete los datos del vehículo, cliente y celda asignada</p>
            </div>
            <a th:href="@{/menu}" class="btn btn-outline btn-sm">← Volver al Menú</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success">
            ✓ <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            ✗ <span th:text="${error}"></span>
        </div>

        <form th:action="@{/ingreso}" th:object="${form}" method="post">

            <h3 class="form-section-title">🚙 Información del Vehículo</h3>
            <div class="form-grid">
                <div class="form-field col-4">
                    <label class="form-label" for="placa">Placa <span class="req">*</span></label>
                    <input id="placa" type="text" th:field="*{placa}"
                           class="form-input" placeholder="Ej: ABC123" required/>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="vin">VIN (17 caracteres) <span class="req">*</span></label>
                    <input id="vin" type="text" th:field="*{vin}"
                           class="form-input" placeholder="Número de identificación" maxlength="17" required/>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="tipoVehiculo">Tipo de Vehículo <span class="req">*</span></label>
                    <select id="tipoVehiculo" th:field="*{tipoVehiculo}" class="form-select" required>
                        <option value="">-- Seleccione --</option>
                        <option th:value="Carro">🚗 Carro</option>
                        <option th:value="Moto">🏍️ Moto</option>
                    </select>
                </div>
            </div>

            <h3 class="form-section-title">👤 Información del Cliente</h3>
            <div class="form-grid">
                <div class="form-field col-4">
                    <label class="form-label" for="cedula">Cédula <span class="req">*</span></label>
                    <input id="cedula" type="text" th:field="*{cedula}"
                           class="form-input" placeholder="Número de identificación" required/>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="nombre">Nombre Completo <span class="req">*</span></label>
                    <input id="nombre" type="text" th:field="*{nombre}"
                           class="form-input" placeholder="Nombre del cliente" required/>
                </div>
                <div class="form-field col-4">
                    <label class="form-label" for="telefono">Teléfono <span class="req">*</span></label>
                    <input id="telefono" type="text" th:field="*{telefono}"
                           class="form-input" placeholder="Número de contacto" required/>
                </div>
            </div>

            <h3 class="form-section-title">🅿️ Asignación de Celda</h3>
            <div class="form-grid">
                <div class="form-field col-6">
                    <label class="form-label" for="celdaSelect">
                        Celda disponible <span class="req">*</span>
                    </label>
                    <div style="display:flex;gap:10px;align-items:center;">
                        <select th:field="*{idCelda}" id="celdaSelect" class="form-select" required style="flex:1;">
                            <option value="">-- Seleccione una celda --</option>
                        </select>
                        <button type="button" class="btn btn-outline btn-sm"
                                onclick="cargarCeldasDisponibles()">
                            🔄 Consultar
                        </button>
                    </div>
                    <p class="form-hint">Seleccione el tipo de vehículo y consulte las celdas disponibles.</p>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/menu}" class="btn btn-outline">✗ Cancelar</a>
                <button type="submit" class="btn btn-success">✓ Guardar Ingreso</button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        function cargarCeldasDisponibles() {
            var tipoVehiculo = document.getElementById('tipoVehiculo').value;
            var tipoCelda = tipoVehiculo === 'Carro' ? 'AUTO' : (tipoVehiculo === 'Moto' ? 'MOTO' : '');
            var url = '/api/celdas/disponibles' + (tipoCelda ? '?tipo=' + tipoCelda : '');

            fetch(url, { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(celdas) {
                    var select = document.getElementById('celdaSelect');
                    select.innerHTML = '<option value="">-- Seleccione una celda --</option>';
                    if (celdas.length === 0) {
                        select.innerHTML += '<option value="" disabled>No hay celdas disponibles</option>';
                    } else {
                        celdas.forEach(function(c) {
                            select.innerHTML += '<option value="' + c.idCelda + '">'
                                + c.codigo + ' (' + c.tipo + ' - ' + (c.ubicacion || '') + ')</option>';
                        });
                    }
                })
                .catch(function(err) {
                    alert('Error al cargar celdas: ' + err);
                });
        }

        document.getElementById('tipoVehiculo').addEventListener('change', cargarCeldasDisponibles);
    </script>

</section>
</body>
</html>
