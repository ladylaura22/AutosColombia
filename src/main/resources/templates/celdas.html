<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asignación de Celdas - Autos Colombia</title>
<link rel="stylesheet" href="../css/celdas.css">
</head>
<body>
    <header>
        <h1>🚗 Autos Colombia</h1>
        <h3>Asignación de Celdas</h3>
    </header>

    <!-- FORMULARIO DE ASIGNACIÓN -->
    <div class="formulario">
        <h2>📍 Asignar Celda a Vehículo</h2>
        <label>Placa del vehículo:</label><br>
        <input type="text" id="placa" placeholder="ABC-123" maxlength="8" required><br><br>

        <label>Celda disponible sugerida:</label><br>
        <select id="celdaSelect"></select><br><br>

        <button onclick="asignarCelda()">✅ Asignar Celda</button>
    </div>

    <!-- MAPA VISUAL DE CELDAS -->
    <div class="grid-celdas" id="gridCeldas"></div>
    
    <!-- SCRIPT DE LÓGICA DE CÉLDAS -->
    <script src="../src/main/resources/static/js/celdas.js"></script>

</body>
</html>
