<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: body(~{::section#page-content}, 'Celdas', 'celdas')}">
<head>
    <link rel="stylesheet" th:href="@{/css/celdas.css}"/>
</head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">🏢 Dashboard de Celdas</h2>
                <p class="card-subtitle">Estado actual de todas las celdas del parqueadero</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <a th:href="@{/celdas/nueva}" sec:authorize="hasRole('ADMIN')"
                   class="btn btn-success btn-sm">+ Nueva Celda</a>
                <a th:href="@{/menu}" class="btn btn-outline btn-sm">← Volver al Menú</a>
            </div>
        </div>

        <div th:if="${param.exito}" class="alert alert-success">✓ Operación realizada con éxito.</div>
        <div th:if="${error}" class="alert alert-danger">✗ <span th:text="${error}"></span></div>

        <!-- Legend -->
        <div class="celda-legend">
            <div class="celda-legend-item">
                <span class="celda-legend-dot dot-disponible"></span> Disponible
            </div>
            <div class="celda-legend-item">
                <span class="celda-legend-dot dot-ocupado"></span> Ocupada
            </div>
            <div class="celda-legend-item">
                <span class="celda-legend-dot dot-mantenimiento"></span> Mantenimiento
            </div>
        </div>

        <!-- Cell grid -->
        <div id="gridCeldas" class="celda-grid">
            <div th:each="celda : ${celdas}"
                 th:classappend="${celda.estado.name().toLowerCase()}"
                 class="celda-card">
                <strong th:text="${celda.codigo}">A-101</strong>
                <small th:text="${celda.tipo} + ' • ' + ${celda.ubicacion}">AUTO • Piso 1</small>
                <span class="estado-label" th:text="${celda.estado}">DISPONIBLE</span>

                <!-- Change state (admin only) -->
                <div sec:authorize="hasRole('ADMIN')" style="margin-top:10px;">
                    <form th:action="@{/celdas/{id}/estado(id=${celda.idCelda})}" method="post"
                          style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;justify-content:center;">
                        <select name="estado" class="form-select" style="font-size:11px;padding:4px;flex:1;min-width:90px;">
                            <option th:each="est : ${estadoCelda}"
                                    th:value="${est}"
                                    th:text="${est}"
                                    th:selected="${celda.estado == est}">DISPONIBLE</option>
                        </select>
                        <input type="text" name="motivoMantenimiento"
                               class="form-input"
                               placeholder="Motivo (opc.)"
                               style="font-size:11px;padding:4px;flex:1;min-width:80px;"/>
                        <button type="submit" class="btn btn-secondary btn-sm"
                                style="padding:4px 8px;font-size:11px;">Cambiar</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(celdas)}" class="table-empty">
            No hay celdas registradas.
        </div>
    </div>

    <script th:src="@{/js/celdas.js}"></script>

</section>
</body>
</html>
