<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: body(~{::section#page-content}, 'Buscar Vehículo', 'buscar')}">
<head></head>
<body>
<section th:fragment="content" id="page-content">

    <div class="card">
        <div class="card-header">
            <div>
                <h2 class="card-title">🔍 Buscar Registro por Placa</h2>
                <p class="card-subtitle">Consulte el historial de registro de un vehículo</p>
            </div>
            <a th:href="@{/menu}" class="btn btn-outline btn-sm">← Volver al Menú</a>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            ✗ <span th:text="${error}"></span>
        </div>

        <form th:action="@{/buscar}" th:object="${form}" method="post">
            <div class="form-grid">
                <div class="form-field col-6">
                    <label class="form-label" for="placa">🔖 Placa del Vehículo <span class="req">*</span></label>
                    <input id="placa" type="text" th:field="*{placa}"
                           class="form-input" placeholder="Ej: ABC123" required autofocus/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">🔍 Buscar Registro</button>
            </div>
        </form>
    </div>

    <!-- Result card -->
    <div th:if="${registro}" class="card mt-3">
        <div class="card-header">
            <h3 class="card-title">📋 Información del Registro</h3>
            <span class="badge badge-success" th:if="${registro.horaSalida == null}">En parqueadero</span>
            <span class="badge badge-muted"   th:if="${registro.horaSalida != null}">Fuera</span>
        </div>
        <div class="form-grid">
            <div class="col-4">
                <p class="form-label mb-1">🔖 Placa</p>
                <p class="text-bold" th:text="${registro.vehiculo.placa}"></p>
            </div>
            <div class="col-4">
                <p class="form-label mb-1">📥 Hora de Ingreso</p>
                <p th:text="${registro.horaIngreso}"></p>
            </div>
            <div class="col-4">
                <p class="form-label mb-1">📤 Hora de Salida</p>
                <p th:text="${registro.horaSalida != null ? registro.horaSalida : 'Aún en parqueadero'}"></p>
            </div>
            <div class="col-4">
                <p class="form-label mb-1">📍 Lugar Actual</p>
                <p th:text="${registro.lugarActual}"></p>
            </div>
            <div class="col-4">
                <p class="form-label mb-1">💳 Método de Cobro</p>
                <p th:text="${registro.metodoCobro}"></p>
            </div>
        </div>
    </div>

</section>
</body>
</html>
