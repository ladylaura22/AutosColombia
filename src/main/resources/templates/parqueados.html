<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Parqueados - AutosColombia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 AutosColombia</h1>
            <a th:href="@{/menu}" class="btn btn-secondary">← Volver al Menú</a>
        </div>

        <div class="content-box">
            <h2>🅿️ Vehículos Actualmente Parqueados</h2>
            <p style="color: #666; margin-bottom: 25px;">
                Total de vehículos: <strong th:text="${parqueados.size()}"></strong>
            </p>

            <!-- Campo de búsqueda en tiempo real -->
            <div class="form-group" style="max-width: 400px; margin-bottom: 25px;">
                <label>🔍 Buscar en tabla:</label>
                <input type="text" id="tableSearch" placeholder="Filtrar por placa, VIN, tipo..." />
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>🔖 Placa</th>
                            <th>🔢 VIN</th>
                            <th>🚙 Tipo</th>
                            <th>📥 Hora de Ingreso</th>
                            <th>💳 Método de Cobro</th>
                            <th>📍 Lugar</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rp : ${parqueados}">
                            <td><strong th:text="${rp.vehiculo.placa}"></strong></td>
                            <td th:text="${rp.vehiculo.vin}"></td>
                            <td>
                                <span th:if="${rp.vehiculo.tipoVehiculo.name() == 'Carro'}">🚗 Carro</span>
                                <span th:if="${rp.vehiculo.tipoVehiculo.name() == 'Moto'}">🏍️ Moto</span>
                            </td>
                            <td th:text="${#temporals.format(rp.horaIngreso, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span th:if="${rp.metodoCobro.name() == 'Por_hora'}" class="badge badge-info">⏱️ Por Hora</span>
                                <span th:if="${rp.metodoCobro.name() == 'Mensualidad'}" class="badge badge-success">📅 Mensualidad</span>
                            </td>
                            <td>
                                <span th:if="${rp.lugarActual.name() == 'Parqueadero'}" class="badge badge-primary">🅿️ Parqueadero</span>
                                <span th:if="${rp.lugarActual.name() == 'Afuera'}" class="badge badge-secondary">🚪 Afuera</span>
                            </td>
                        </tr>
                        <tr th:if="${parqueados.empty}">
                            <td colspan="6" style="text-align: center; color: #999; padding: 40px;">
                                No hay vehículos parqueados actualmente
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
